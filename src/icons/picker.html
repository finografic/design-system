<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icon Picker — @workspace/design-system</title>
  <!--
    TODO: Write-to-file capability (adding icons directly to icons.ts from this UI)
    requires a local Node.js server since browsers can't write to the filesystem.
    Sketch: picker-server.mjs serves this HTML + exposes POST /api/add-icon and
    POST /api/remove-icon endpoints that edit icons.ts in-place.
    For now this picker is read-only — use it to find icon names, then add manually.
  -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg-card:   #1a1d27;
      --bg-hover:  #22263a;
      --border:    #2e3348;
      --text:      #e2e8f0;
      --text-muted:#7c8db5;
      --accent:    #6366f1;
      --accent-bg: rgba(99,102,241,.15);
      --radius:    8px;
      --font:      system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text-muted);
    }
    h1 span { color: var(--text); }

    #search {
      flex: 1;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    #count {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    main {
      padding: 24px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 120ms, border-color 120ms, transform 120ms;
      user-select: none;
      text-align: center;
    }
    .card:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .card:active { transform: translateY(0); }
    .card.copied {
      border-color: #22c55e;
      background: rgba(34,197,94,.1);
    }

    .card svg {
      width: 22px;
      height: 22px;
      color: var(--text);
      stroke: currentColor;
      fill: none;
      flex-shrink: 0;
    }

    .card-name {
      font-size: 10px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      word-break: break-all;
    }
    .card-lucide {
      font-size: 9px;
      color: var(--text-muted);
      word-break: break-all;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #22c55e;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 999px;
      transition: transform 200ms cubic-bezier(.34,1.56,.64,1), opacity 200ms;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <h1>Icon Picker — <span>@workspace/design-system</span></h1>
  <input id="search" type="search" placeholder="Search icons…" autofocus />
  <span id="count"></span>
</header>

<main>
  <div id="grid"></div>
</main>

<div id="toast">Copied!</div>

<script>
  // ── Icon registry (mirrors icons.ts — keep in sync) ─────────────────────────
  // Format: [exportName, lucideKebabName]
  const ICONS = [
    // Core UI
    ['AddIcon',                 'plus'],
    ['BadgeCheckIcon',          'badge-check'],
    ['CheckCircleIcon',         'check-circle-2'],
    ['ClipboardIcon',           'clipboard'],
    ['CloseIcon',               'x'],
    ['CoffeeIcon',              'coffee'],
    ['Columns3Icon',            'columns-3'],
    ['Columns4Icon',            'columns-4'],
    ['CountdownTimerIcon',      'hourglass'],
    ['Cross2Icon',              'x'],
    ['DeleteIcon',              'x'],
    ['DialogIcon',              'app-window-mac'],
    ['DropdownIcon',            'chevron-down'],
    ['EditIcon',                'pencil-line'],
    ['ExclamationTriangleIcon', 'triangle-alert'],
    ['EyeOffIcon',              'eye-off'],
    ['EyeOnIcon',               'eye'],
    ['FastForwardIcon',         'fast-forward'],
    ['FullscreenIcon',          'fullscreen'],
    ['GridIcon',                'grid-3x3'],
    ['HomeIcon',                'house'],
    ['InfoCircledIcon',         'info'],
    ['LanguageIcon',            'languages'],
    ['ListChecksIcon',          'list-checks'],
    ['ListIcon',                'list'],
    ['LockIcon',                'lock'],
    ['MagnifyingGlassIcon',     'search'],
    ['MenuIcon',                'menu'],
    ['MinimizeIcon',            'minimize'],
    ['MinusIcon',               'minus'],
    ['MoonIcon',                'moon'],
    ['PlusIcon',                'plus'],
    ['RadioIcon',               'radio'],
    ['RefreshIcon',             'refresh-ccw'],
    ['ReloadIcon',              'rotate-cw'],
    ['SettingsIcon',            'cog'],
    ['ShieldCheckIcon',         'shield-check'],
    ['ShuffleIcon',             'shuffle'],
    ['SpeakerLoudIcon',         'volume-2'],
    ['StarIcon',                'star'],
    ['StopIcon',                'circle-stop'],
    ['SunIcon',                 'sun'],
    ['TempIcon',                'thermometer'],
    ['TextAlignLeftIcon',       'align-left'],
    ['TextAlignTopIcon',        'align-start-vertical'],
    ['TimerIcon',               'timer'],
    ['TimerResetIcon',          'timer-reset'],
    ['TrashIcon',               'trash-2'],
    ['UploadIcon',              'upload'],
    ['UserCircleIcon',          'circle-user-round'],
    ['UserIcon',                'user'],
    ['UserLockIcon',            'user-lock'],
    ['UserRoundCheckIcon',      'user-round-check'],
    ['UserShieldIcon',          'shield-user'],
    ['VolumeIcon',              'volume-2'],
    ['VolumeOffIcon',           'volume-off'],
    ['WindowIcon',              'app-window-mac'],
    ['WineIcon',                'wine'],
    ['ZapIcon',                 'zap'],
    // Navigation — Chevrons
    ['ChevronDownIcon',         'chevron-down'],
    ['ChevronLeftIcon',         'chevron-left'],
    ['ChevronRightIcon',        'chevron-right'],
    ['ChevronUpIcon',           'chevron-up'],
    ['DoubleArrowLeftIcon',     'chevrons-left'],
    ['DoubleArrowRightIcon',    'chevrons-right'],
    // Panels
    ['PanelBottomCloseIcon',    'panel-bottom-close'],
    ['PanelBottomOpenIcon',     'panel-bottom-open'],
    ['PanelLeftCloseIcon',      'panel-left-close'],
    ['PanelLeftOpenIcon',       'panel-left-open'],
  ];

  const grid    = document.getElementById('grid');
  const search  = document.getElementById('search');
  const countEl = document.getElementById('count');
  const toast   = document.getElementById('toast');
  let toastTimer;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).catch(() => {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
  }

  function renderIcons(filter) {
    const q = (filter || '').toLowerCase().trim();
    const filtered = q
      ? ICONS.filter(([name, lucide]) =>
          name.toLowerCase().includes(q) || lucide.includes(q)
        )
      : ICONS;

    countEl.textContent = `${filtered.length} / ${ICONS.length}`;
    grid.innerHTML = '';

    if (!filtered.length) {
      grid.innerHTML = '<p class="empty">No icons match your search.</p>';
      return;
    }

    const frag = document.createDocumentFragment();

    filtered.forEach(([name, lucide]) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.title = `Click to copy import for ${name}`;
      card.dataset.name = name;
      card.dataset.lucide = lucide;

      // Icon placeholder — Lucide replaces <i data-lucide="…"> with SVG
      const icon = document.createElement('i');
      icon.setAttribute('data-lucide', lucide);

      const nameEl = document.createElement('div');
      nameEl.className = 'card-name';
      nameEl.textContent = name;

      const lucideEl = document.createElement('div');
      lucideEl.className = 'card-lucide';
      lucideEl.textContent = lucide;

      card.append(icon, nameEl, lucideEl);

      card.addEventListener('click', () => {
        const importStr = `import { icons } from '@workspace/design-system/icons';\nconst { ${name} } = icons;`;
        copyToClipboard(importStr);
        showToast(`Copied ${name}!`);
        card.classList.add('copied');
        setTimeout(() => card.classList.remove('copied'), 1200);
      });

      frag.appendChild(card);
    });

    grid.appendChild(frag);

    // Render Lucide SVGs
    if (window.lucide) {
      lucide.createIcons();
    }
  }

  // Initial render
  renderIcons('');

  // Search
  let debounce;
  search.addEventListener('input', (e) => {
    clearTimeout(debounce);
    debounce = setTimeout(() => renderIcons(e.target.value), 120);
  });
</script>
</body>
</html>
